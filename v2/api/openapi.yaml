          exampleSetFlag: true
          format: uuid
          readOnly: true
          type: string
        version:
          description: Universe version
          exampleSetFlag: false
          format: int32
          readOnly: true
          type: integer
        creation_date:
          description: Universe creation date
          example: 2022-12-12T13:07:18Z
          exampleSetFlag: true
          format: date-time
          readOnly: true
          type: string
        arch:
          description: CPU Arch of DB nodes.
          enum:
          - x86_64
          - aarch64
          example: x86_64
          exampleSetFlag: true
          readOnly: true
          type: string
        dns_name:
          description: DNS name
          example: dbnode1.dev.universe.company.com
          exampleSetFlag: true
          readOnly: true
          type: string
        ybc_software_version:
          description: YBC Software version installed in DB nodes of this Universe
          example: 2.1.0.0-b6
          exampleSetFlag: true
          readOnly: true
          type: string
        platform_url:
          description: YBA that is managing this Universe
          example: yba.dev.company.com
          exampleSetFlag: true
          readOnly: true
          type: string
        node_prefix:
          description: A globally unique name generated as a combination of the customer
            id and the universe name. This is used as the prefix of node names in
            the universe. Can be configured at the time of universe creation.
          example: yb-dev-universe-name
          exampleSetFlag: true
          readOnly: true
          type: string
        encryption_at_rest_info:
          $ref: '#/components/schemas/EncryptionAtRestInfo'
        update_in_progress:
          description: Whether a create/edit/destroy intent on the universe is currently
            running.
          example: false
          exampleSetFlag: true
          readOnly: true
          type: boolean
        updating_task:
          description: Type of task which set updateInProgress flag.
          example: CreateUniverse
          exampleSetFlag: true
          readOnly: true
          type: string
        updating_task_uuid:
          description: UUID of task which set updateInProgress flag.
          example: 489a0632-2d6c-460f-b3d3-d8413b8559c0
          exampleSetFlag: true
          format: uuid
          readOnly: true
          type: string
        update_succeeded:
          description: Whether the latest operation on this universe has successfully
            completed. Is updated for each operation on the universe.
          example: true
          exampleSetFlag: true
          readOnly: true
          type: boolean
        universe_paused:
          description: Whether the universe is in the paused state
          example: false
          exampleSetFlag: true
          readOnly: true
          type: boolean
        placement_modification_task_uuid:
          description: UUID of last failed task that applied modification to cluster
            state
          example: 18d9e569-5e01-49ef-88a3-eff0804bad4a
          exampleSetFlag: true
          format: uuid
          readOnly: true
          type: string
        software_upgrade_state:
          description: The state of the last YugabyteDB software upgrade operation
            on this universe
          enum:
          - Ready
          - Upgrading
          - UpgradeFailed
          - PreFinalize
          - Finalizing
          - FinalizeFailed
          - RollingBack
          - RollbackFailed
          example: Ready
          exampleSetFlag: true
          readOnly: true
          type: string
        is_software_rollback_allowed:
          description: Whether a rollback of the last YugabyteDB upgrade operation
            is allowed
          example: true
          exampleSetFlag: true
          readOnly: true
          type: boolean
        nodes_resize_available:
          description: Set to true if nodes of this Universe can be resized without
            a full move
          example: true
          exampleSetFlag: true
          readOnly: true
          type: boolean
        is_kubernetes_operator_controlled:
          description: Whether this Universe is created and controlled by the Kubernetes
            Operator
          example: true
          exampleSetFlag: true
          readOnly: true
          type: boolean
        otel_collector_enabled:
          description: Whether OpenTelemetry Collector is enabled for universe
          exampleSetFlag: false
          type: boolean
          x-yba-api-visibility: internal
        x_cluster_info:
          $ref: '#/components/schemas/XClusterInfo'
        clusters:
          exampleSetFlag: false
          items:

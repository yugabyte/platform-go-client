openapi: 3.0.0
info:
  contact:
    email: support@yugabyte.com
    name: YugabyteDB Anywhere Support
    url: https://docs.yugabyte.com
  description: An improved set of APIs for managing YugabyteDB Anywhere
  license:
    name: Polyform Free Trial License 1.0.0
    url: https://github.com/yugabyte/yugabyte-db/blob/master/licenses/POLYFORM-FREE-TRIAL-LICENSE-1.0.0.txt
  title: YugabyteDB Anywhere V2 APIs
  version: v2
servers:
- description: API endpoint of YBA server
  url: "{protocol}://{host_port}"
  variables:
    protocol:
      default: http
      enum:
      - http
      - https
    host_port:
      default: localhost:9000
tags:
- description: CRUD operations for a Universe
  name: Universe
paths:
  /customers/{cUUID}/universes/{uniUUID}:
    get:
      description: Get details of a single YugabyteDB Universe.
      operationId: getUniverse
      parameters:
      - description: Customer UUID
        explode: false
        in: path
        name: cUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      - description: Universe UUID
        explode: false
        in: path
        name: uniUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Universe'
          description: success
        "400":
          description: Invalid input
        "500":
          description: Server error
      security:
      - apiKeyAuth: []
      summary: Get a YugabyteDB Universe
      tags:
      - Universe
      x-yba-api-audit:
        noAudit: true
      x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: READ
        resourceLocation:
          path: universes
          sourceType: endpoint
        checkOnlyPermission: false
      x-yba-api-since: 2024.2.0.0
      x-yba-api-visibility: preview
      x-accepts: application/json
    put:
      description: Edit the clusters of a single YugabyteDB Universe.
      operationId: editUniverse
      parameters:
      - description: Customer UUID
        explode: false
        in: path
        name: cUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      - description: Universe UUID
        explode: false
        in: path
        name: uniUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      requestBody:
        $ref: '#/components/requestBodies/UniverseEditReq'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YBPTask'
          description: task accepted
        "400":
          description: Invalid input
        "500":
          description: Server error
      security:
      - apiKeyAuth: []
      summary: Edit a YugabyteDB Universe
      tags:
      - Universe
      x-yba-api-audit:
        auditTargetType: Universe
        auditTargetId: uniUUID.toString()
        auditActionType: Update
        taskUuid: obj.getTaskUuid()
      x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: UPDATE
        resourceLocation:
          path: UNIVERSES
          sourceType: ENDPOINT
        checkOnlyPermission: false
      x-yba-api-since: 2024.2.0.0
      x-yba-api-visibility: preview
      x-contentType: application/json
      x-accepts: application/json
  /customers/{cUUID}/universes:
    post:
      description: Create all the clusters of a YugabyteDB universe.
      operationId: createUniverse
      parameters:
      - description: Customer UUID
        explode: false
        in: path
        name: cUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      requestBody:
        $ref: '#/components/requestBodies/UniverseCreateReq'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YBPTask'
          description: task accepted
        "400":
          description: Invalid input
        "500":
          description: Server error
      security:
      - apiKeyAuth: []
      summary: Create a YugabyteDB Universe
      tags:
      - Universe
      x-yba-api-audit:
        auditTargetType: Universe
        auditTargetId: obj.getResourceUuid().toString()
        auditActionType: CreateCluster
        taskUuid: obj.getTaskUuid()
      x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: CREATE
        resourceLocation:
          path: UNIVERSE_UUID
          sourceType: REQUEST_BODY
        checkOnlyPermission: false
      x-yba-api-since: 2024.2.0.0
      x-yba-api-visibility: preview
      x-contentType: application/json
      x-accepts: application/json
  /customers/{cUUID}/universes/{uniUUID}/clusters:
    post:
      description: Add a cluster (eg. read replica cluster) to a YugabyteDB universe.
      operationId: addCluster
      parameters:
      - description: Customer UUID
        explode: false
        in: path
        name: cUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      - description: Universe UUID
        explode: false
        in: path
        name: uniUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      requestBody:
        $ref: '#/components/requestBodies/ClusterAddReq'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YBPTask'
          description: task accepted
        "400":
          description: Invalid input
        "500":
          description: Server error
      security:
      - apiKeyAuth: []
      summary: Add a cluster to a YugabyteDB Universe
      tags:
      - Universe
      x-yba-api-audit:
        auditTargetType: Universe
        auditTargetId: uniUUID.toString()
        auditActionType: CreateReadOnlyCluster
        taskUuid: obj.getTaskUuid()
      x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: UPDATE
        resourceLocation:
          path: UNIVERSES
          sourceType: ENDPOINT
        checkOnlyPermission: false
      x-yba-api-since: 2024.2.0.0
      x-yba-api-visibility: preview
      x-contentType: application/json
      x-accepts: application/json
  /customers/{cUUID}/universes/{uniUUID}/clusters/{clsUUID}:
    delete:
      description: Delete an additional cluster (eg. read replica cluster) of a YugabyteDB
        universe. Primary cluster is deleted along with Universe.
      operationId: deleteCluster
      parameters:
      - description: Customer UUID
        explode: false
        in: path
        name: cUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      - description: Universe UUID
        explode: false
        in: path
        name: uniUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      - description: Cluster UUID
        explode: false
        in: path
        name: clsUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      - description: Whether to force delete the cluster
        explode: true
        in: query
        name: isForceDelete
        required: false
        schema:
          default: false
          exampleSetFlag: false
          type: boolean
        style: form
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YBPTask'
          description: task accepted
        "400":
          description: Invalid input
        "500":
          description: Server error
      security:
      - apiKeyAuth: []
      summary: Delete an additional cluster(s) of a YugabyteDB Universe
      tags:
      - Universe
      x-yba-api-audit:
        auditTargetType: Universe
        auditTargetId: uniUUID.toString()
        auditActionType: DeleteReadOnlyCluster
        taskUuid: obj.getTaskUuid()
      x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: UPDATE
        resourceLocation:
          path: UNIVERSES
          sourceType: ENDPOINT
        checkOnlyPermission: false
      x-yba-api-since: 2024.2.0.0
      x-yba-api-visibility: preview
      x-accepts: application/json
  /customers/{cUUID}/universes/{uniUUID}/gflags:
    post:
      description: "Queues a task to edit GFlags of a universe. The input set of GFlags\
        \ will replace any existing GFlags in the universe. Refer [YB-Master configuration\
        \ flags](https://docs.yugabyte.com/preview/reference/configuration/yb-master/#configuration-flags)\
        \ and [YB-TServer configuration flags](https://docs.yugabyte.com/preview/reference/configuration/yb-tserver/#configuration-flags)."
      operationId: editGFlags
      parameters:
      - description: Customer UUID
        explode: false
        in: path
        name: cUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      - description: Universe UUID
        explode: false
        in: path
        name: uniUUID
        required: true
        schema:
          exampleSetFlag: false
          format: uuid
          type: string
        style: simple
      requestBody:
        $ref: '#/components/requestBodies/UniverseEditGFlagsReq'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YBPTask'
          description: task accepted
        "400":
          description: Invalid input
        "500":
          description: Server error
      security:
      - apiKeyAuth: []
      summary: Edit GFlags
      tags:
      - Universe
      x-yba-api-audit:
        auditTargetType: Universe
        auditTargetId: uniUUID.toString()
        auditActionType: UpgradeGFlags
        taskUuid: obj.getTaskUuid()
        additionalDetails: true
      x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: UPDATE
        resourceLocation:
          path: universes
          sourceType: endpoint
        checkOnlyPermission: false
      x-yba-api-since: 2.20.2.0
      x-yba-api-visibility: preview
      x-contentType: application/json
      x-accepts: application/json
components:
  requestBodies:
    UniverseEditReq:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UniverseEditSpec'
      required: true
    UniverseCreateReq:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UniverseCreateSpec'
      required: true
    ClusterAddReq:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClusterAddSpec'
      required: true
    UniverseEditGFlagsReq:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UniverseEditGFlags'
      required: true
  responses:
    UniverseResp:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Universe'
      description: success
    YBPTaskResp:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/YBPTask'
      description: task accepted
  schemas:
    EncryptionAtRestSpec:
      example:
        kms_config_uuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      exampleSetFlag: true
      properties:
        kms_config_uuid:
          description: The KMS Configuration associated with the encryption keys being
            used on this Universe
          exampleSetFlag: false
          format: uuid
          type: string
      title: Encryption At Rest specification for the Universe
      type: object
    EncryptionInTransitSpec:
      description: Specification of node-to-node and client-to-node TLS encryption
      example:
        client_root_ca: 1711b83b-af74-416b-84b9-e9f66b532c82
        enable_node_to_node_encrypt: false
        enable_client_to_node_encrypt: false
        root_ca: fce99806-03f0-4b17-9483-297ccfaa368d
      exampleSetFlag: true
      properties:
        enable_node_to_node_encrypt:
          description: Whether to enable encryption for communication among DB nodes
          example: false
          exampleSetFlag: true
          type: boolean
        enable_client_to_node_encrypt:
          description: Whether to enable encryption for client connection to DB nodes
          example: false
          exampleSetFlag: true
          type: boolean
        root_ca:
          description: The UUID of the rootCA to be used to generate node certificates
            and facilitate TLS communication between database nodes.
          example: fce99806-03f0-4b17-9483-297ccfaa368d
          exampleSetFlag: true
          format: uuid
          type: string
        client_root_ca:
          description: The UUID of the clientRootCA to be used to generate client
            certificates and facilitate TLS communication between server and client.
            Can be set to same as root_CA.
          example: 1711b83b-af74-416b-84b9-e9f66b532c82
          exampleSetFlag: true
          format: uuid
          type: string
      title: Encryption In Transit Specification
      type: object
    YsqlSpec:
      example:
        enable: true
        enable_auth: false
      exampleSetFlag: true
      properties:
        enable:
          description: Whether to enable YSQL API on this Universe
          example: true
          exampleSetFlag: true
          type: boolean
        enable_auth:
          description: Whether to enable authentication to access YSQL on this Universe
          example: false
          exampleSetFlag: true
          type: boolean
      title: YSQL Spec for the Universe
      type: object
    YcqlSpec:
      example:
        enable: true
        enable_auth: false
      exampleSetFlag: true
      properties:
        enable:
          description: Whether to enable YCQL API on this Universe
          example: true
          exampleSetFlag: true
          type: boolean
        enable_auth:
          description: Whether to enable authentication to access YCQL on this Universe
          example: false
          exampleSetFlag: true
          type: boolean
      title: YCQL Spec for the Universe
      type: object
    CommunicationPortsSpec:
      example:
        ysql_server_http_port: 13000
        yql_server_http_port: 12000
        tserver_http_port: 9000
        yb_controller_http_port: 14000
        redis_server_http_port: 11000
        redis_server_rpc_port: 6379
        ysql_server_rpc_port: 5433
        master_rpc_port: 7100
        tserver_rpc_port: 9100
        yql_server_rpc_port: 9042
        node_exporter_port: 9300
        master_http_port: 7000
        otel_collector_metrics_port: 8889
        yb_controller_rpc_port: 18018
      exampleSetFlag: true
      properties:
        master_http_port:
          default: 7000
          description: Master table HTTP port
          example: 7000
          exampleSetFlag: true
          format: int32
          type: integer
        master_rpc_port:
          default: 7100
          description: Master table RCP port
          example: 7100
          exampleSetFlag: true
          format: int32
          type: integer
        node_exporter_port:
          default: 9300
          description: Node exporter port
          example: 9300
          exampleSetFlag: true
          format: int32
          type: integer
        otel_collector_metrics_port:
          default: 8889
          description: Otel Collector metrics port
          example: 8889
          exampleSetFlag: true
          format: int32
          type: integer
        redis_server_http_port:
          default: 11000
          description: Redis HTTP port
          example: 11000
          exampleSetFlag: true
          format: int32
          type: integer
        redis_server_rpc_port:
          default: 6379
          description: Redis RPC port
          example: 6379
          exampleSetFlag: true
          format: int32
          type: integer
        tserver_http_port:
          default: 9000
          description: Tablet server HTTP port
          example: 9000
          exampleSetFlag: true
          format: int32
          type: integer
        tserver_rpc_port:
          default: 9100
          description: Tablet server RPC port
          example: 9100
          exampleSetFlag: true
          format: int32
          type: integer
        yb_controller_http_port:
          default: 14000
          description: Yb controller HTTP port
          example: 14000
          exampleSetFlag: true
          format: int32
          type: integer
        yb_controller_rpc_port:
          default: 18018
          description: Yb controller RPC port
          example: 18018
          exampleSetFlag: true
          format: int32
          type: integer
        yql_server_http_port:
          default: 12000
          description: YQL HTTP port
          example: 12000
          exampleSetFlag: true
          format: int32
          type: integer
        yql_server_rpc_port:
          default: 9042
          description: YQL RPC port
          example: 9042
          exampleSetFlag: true
          format: int32
          type: integer
        ysql_server_http_port:
          default: 13000
          description: YSQL HTTP port
          example: 13000
          exampleSetFlag: true
          format: int32
          type: integer
        ysql_server_rpc_port:
          default: 5433
          description: YSQL RPC port
          example: 5433
          exampleSetFlag: true
          format: int32
          type: integer
      readOnly: false
      title: Communication Ports used by nodes of this Universe
      type: object
    UniverseNetworkingSpec:
      example:
        enable_ipv6: false
        communication_ports:
          ysql_server_http_port: 13000
          yql_server_http_port: 12000
          tserver_http_port: 9000
          yb_controller_http_port: 14000
          redis_server_http_port: 11000
          redis_server_rpc_port: 6379
          ysql_server_rpc_port: 5433
          master_rpc_port: 7100
          tserver_rpc_port: 9100
          yql_server_rpc_port: 9042
          node_exporter_port: 9300
          master_http_port: 7000
          otel_collector_metrics_port: 8889
          yb_controller_rpc_port: 18018
        assign_public_ip: true
        assign_static_public_ip: false
      exampleSetFlag: true
      properties:
        communication_ports:
          $ref: '#/components/schemas/CommunicationPortsSpec'
        assign_public_ip:
          default: true
          description: Whether to assign a public IP for nodes in this Universe.
          example: true
          exampleSetFlag: true
          type: boolean
        assign_static_public_ip:
          default: false
          description: Whether to assign a static public IP for nodes in this Universe.
          example: false
          exampleSetFlag: true
          type: boolean
        enable_ipv6:
          description: Whether to enable IPv6 on nodes in this cluster. Defaults to
            false.
          example: false
          exampleSetFlag: true
          type: boolean
      title: Networking specification that is used for nodes in this Universe
      type: object
    ClusterStorageSpec:
      example:
        mount_points: mount_points
        storage_type: IO1
        storage_class: storage_class
        volume_size: 0
        num_volumes: 6
        throughput: 5
        disk_iops: 1
      exampleSetFlag: true
      properties:
        volume_size:
          description: The size of each volume in each instance. Could be modified
            in payload for /resize_node API call
          exampleSetFlag: false
          format: int32
          type: integer
        num_volumes:
          description: Number of volumes to be mounted on this instance at the default
            path
          exampleSetFlag: false
          format: int32
          type: integer
        mount_points:
          description: Comma-separated list of mount points for the volumes in each
            instance. Required for an onprem cluster.
          exampleSetFlag: false
          type: string
        storage_class:
          description: "Name of the storage class, if this is a kubernetes cluster"
          exampleSetFlag: false
          type: string
        storage_type:
          description: "Storage type used for this instance, if this is a aws (IO1,\
            \ GP2, GP3), gcp (Scratch, Persistent) or azu (StandardSSD_LRS, Premium_LRS,\
            \ UltraSSD_LRS) cluster."
          enum:
          - IO1
          - GP2
          - GP3
          - Scratch
          - Persistent
          - StandardSSD_LRS
          - Premium_LRS
          - UltraSSD_LRS
          - Local
          exampleSetFlag: false
          type: string
        disk_iops:
          description: "Desired IOPS for the volumes mounted on this aws, gcp or azu\
            \ instance"
          exampleSetFlag: false
          format: int32
          type: integer
        throughput:
          description: "Desired throughput for the volumes mounted on this aws, gcp\
            \ or azu instance"
          exampleSetFlag: false
          format: int32
          type: integer
      title: Storage volume specification that is used for tserver nodes in this cluster
      type: object
    ClusterNetworkingSpec:
      example:
        enable_lb: false
        enable_exposing_service: NONE
      exampleSetFlag: true
      properties:
        enable_exposing_service:
          default: NONE
          description: Whether to create a load balancer service for this cluster.
            Defaults to NONE.
          enum:
          - NONE
          - EXPOSED
          - UNEXPOSED
          exampleSetFlag: false
          type: string
        enable_lb:
          description: Create target groups if enabled. Used by YBM.
          example: false
          exampleSetFlag: true
          type: boolean
          x-yba-api-visibility: internal
      title: Networking specification that is used for nodes in this cluster
      type: object
    ClusterProviderSpec:
      example:
        region_list:
        - 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        - 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        provider: 89a46d52-4edd-4736-922a-35177a0b990c
        access_key_code: aws-ssh-key
        preferred_region: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        image_bundle_uuid: 914aa5a8-febc-44ba-9b60-ea3e22127218
      exampleSetFlag: true
      properties:
        provider:
          description: Cloud provider UUID
          example: 89a46d52-4edd-4736-922a-35177a0b990c
          exampleSetFlag: true
          format: uuid
          type: string
        region_list:
          description: The list of regions in the cloud provider to place data replicas
          exampleSetFlag: false
          items:
            exampleSetFlag: false
            format: uuid
            type: string
          type: array
        preferred_region:
          description: The region to nominate as the preferred region in a geo-partitioned
            multi-region cluster
          exampleSetFlag: false
          format: uuid
          type: string
        access_key_code:
          description: One of the SSH access keys defined in Cloud Provider to be
            configured on nodes VMs
          example: aws-ssh-key
          exampleSetFlag: true
          type: string
        image_bundle_uuid:
          description: Image bundle UUID to use for node VM image. Refers to one of
            the image bundles defined in the cloud provider.
          example: 914aa5a8-febc-44ba-9b60-ea3e22127218
          exampleSetFlag: true
          format: uuid
          type: string
      required:
      - access_key_code
      - provider
      title: Cloud Provider settings for the cluster
      type: object
    PlacementAZ:
      example:
        subnet: subnet
        num_nodes_in_az: 2
        replication_factor: 5
        secondary_subnet: secondary_subnet
        name: name
        leader_affinity: true
        uuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        lb_name: lb_name
      exampleSetFlag: true
      properties:
        uuid:
          description: The AZ id
          exampleSetFlag: false
          format: uuid
          type: string
        name:
          description: The AZ name
          exampleSetFlag: false
          type: string
        replication_factor:
          description: The minimum number of copies of data we should place into this
            AZ.
          exampleSetFlag: false
          format: int32
          type: integer
        subnet:
          description: The subnet in the AZ.
          exampleSetFlag: false
          type: string
        secondary_subnet:
          description: The secondary subnet in the AZ.
          exampleSetFlag: false
          type: string
        num_nodes_in_az:
          description: Number of nodes in each AZ.
          exampleSetFlag: false
          format: int32
          type: integer
        leader_affinity:
          description: Affinitizes raft leaders to this AZ.
          exampleSetFlag: false
          type: boolean
        lb_name:
          description: The Load Balancer id.
          exampleSetFlag: false
          type: string
      title: YBA Placement Availability Zone within Placement Region
      type: object
    PlacementRegion:
      example:
        code: code
        name: name
        lb_fqdn: lb_fqdn
        uuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        az_list:
        - subnet: subnet
          num_nodes_in_az: 2
          replication_factor: 5
          secondary_subnet: secondary_subnet
          name: name
          leader_affinity: true
          uuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          lb_name: lb_name
        - subnet: subnet
          num_nodes_in_az: 2
          replication_factor: 5
          secondary_subnet: secondary_subnet
          name: name
          leader_affinity: true
          uuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          lb_name: lb_name
      exampleSetFlag: true
      properties:
        uuid:
